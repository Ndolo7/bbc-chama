{% extends "chama/base.html" %}

{% block title %}Delete Contribution{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card border-danger border-0 shadow-sm">
            <div class="card-header bg-danger text-white py-3">
                <h6 class="mb-0 fw-semibold"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h6>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this contribution?</p>
                <div class="bg-light rounded p-3 mb-4">
                    <strong>{{ contribution }}</strong>
                    <br><small class="text-muted">Code: {{ contribution.mpesa_code }}</small>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">
                        <i class="bi bi-trash me-1"></i>Yes, delete
                    </button>
                    <a href="{% url 'chama:contributions' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
