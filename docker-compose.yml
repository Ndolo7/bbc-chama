version: '3.8'

services:
  web:
    image: ghcr.io/ndolo7/bbc-chama:latest
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env

  redis:
    image: redis:7-alpine

  worker:
    image: ghcr.io/ndolo7/bbc-chama:latest
    command: celery -A bbc_chama worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db

  beat:
    image: ghcr.io/ndolo7/bbc-chama:latest
    command: celery -A bbc_chama beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db

volumes:
  postgres_data:
  static_volume:
